<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ledger</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app">
    <aside class="sidebar">
      <div class="logo-row">
        <div class="logo">L</div>
        <div>
          <h1>Ledger</h1>
          <p>ניהול חודשי פשוט</p>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-screen="dashboard">תמונת חודש</button>
        <button class="nav-item" data-screen="transactions">עסקאות</button>
        <button class="nav-item" data-screen="income">הכנסות</button>
        <button class="nav-item" data-screen="fixed">הוצאות קבועות</button>
        <button class="nav-item" data-screen="offsets">קיזוזים</button>
        <button class="nav-item" data-screen="categories">קטגוריות</button>
        <button class="nav-item" data-screen="import">ייבוא CSV</button>
        <button class="nav-item" data-screen="backup">גיבוי</button>
        <button class="nav-item" data-screen="settings">הגדרות</button>
      </nav>
      <div class="sidebar-foot">
        <div id="saveStatus">נשמר מקומית</div>
        <div id="cloudStatus">ענן: לא מחובר</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="screenTitle">תמונת חודש</h2>
          <p id="screenSubtitle">האם חסכת, לאן הלך הכסף, ומה דורש טיפול</p>
        </div>
        <div class="month-control">
          <button id="prevMonth" title="חודש קודם">‹</button>
          <strong id="monthLabel"></strong>
          <button id="nextMonth" title="חודש הבא">›</button>
        </div>
      </header>
      <section id="content" class="content"></section>
    </main>
  </div>

  <template id="toastTpl"><div class="toast"></div></template>
  <div id="toastHost" class="toast-host"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
