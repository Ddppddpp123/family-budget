<script>

const APP_VERSION='v22';
const LS='ledger-v9-state'; const CFG='ledger-v9-config';
const months=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const defaultCategories=['בית','הוצאות מזדמנות לבית','סופר','מסעדות','בגדים','ילדים','חינוך','בריאות','רכב','דלק','ביטוח','תקשורת','נופש','בילויים','כלבים','עבודה','חסכונות','משכנתא','קיזוז','מסים','העברות','מתנות','יופי','פארמה','מחשבים','אחר'];
const exceptionTypes=['','חופשה בארץ','חופשה בחו"ל','בר/בת מצווה','אירוע משפחתי','שיפוץ','רכב חריג','ריהוט','ציוד לבית','בריאות חריגה','חינוך חריג','אחר'];
const catColors=['#2563eb','#0891b2','#059669','#65a30d','#ca8a04','#ea580c','#dc2626','#be185d','#9333ea','#4f46e5','#0f766e','#475569'];
const members=['משפחה','פיני','מעיין','יובל','ירדן','יואב'];
const memberColors={משפחה:'#334155',פיני:'#2563eb','מעיין':'#db2777','יובל':'#f59e0b','ירדן':'#10b981','יואב':'#8b5cf6'};
const defaultIncome=['משכורת פיני','משכורת מעיין','ביטוח לאומי ילדים'];
const defaultFixed=['משכנתא','חיסכון ילדים - מור','הלוואה קטנוע'];
const defaultOffsets=['מס הכנסה','ביטוח לאומי','ביטוח לאומי / מגדל','פנסיה מנורה'];
let state=loadState(); let config=loadConfig(); let supa=null; let cloudSession=false; let saveTimer=null;
const screens=[['dashboard','תמונת חודש'],['income','הכנסות'],['fixed','הוצאות קבועות'],['offsets','קיזוזים'],['transactions','פירוט עסקאות'],['categories','קטגוריות'],['import','ייבוא קבצים'],['backup','גיבוי ושחזור'],['cloud','גיבוי ענן'],['settings','הגדרות']];
let screen='dashboard';
function blank(){return {year:2026,month:6,income:[],fixed:[],offsets:[],transactions:[],categories:[],merchantRules:{},memberRules:{},exceptionRules:{},lastCloudAt:null}}
function loadState(){try{return ensureDefaults(JSON.parse(localStorage.getItem(LS))||blank())}catch{return ensureDefaults(blank())}}
function loadConfig(){try{return JSON.parse(localStorage.getItem(CFG))||{}}catch{return {}}}
function saveConfig(){localStorage.setItem(CFG,JSON.stringify(config))}
const LEGACY_RECURRING_YEAR=2026;
const LEGACY_RECURRING_MONTH=6; // July 2026. Existing manually-entered income/fixed/offset data belonged to July.
function normalizeCategoryName(n){
  const x=String(n||'').trim();
  if(x==='הוצאות מזדמנות לבית')return 'הוצאות מזדמנות לבית';
  if(x==='אוכל')return 'סופר';
  return x||'אחר';
}
function normalizeCategoryData(s){
  s.categories=s.categories||[];
  const seen=new Map();
  s.categories.forEach((c,i)=>{
    const name=normalizeCategoryName(c.name);
    if(!seen.has(name))seen.set(name,{...c,name,color:c.color||catColors[i%catColors.length]});
  });
  s.categories=[...seen.values()];
  ['income','fixed','offsets','transactions'].forEach(type=>{
    (s[type]||[]).forEach(item=>{if(item.category)item.category=normalizeCategoryName(item.category)});
  });
  if(s.merchantRules){
    Object.values(s.merchantRules).forEach(r=>{
      if(typeof r==='object'&&r&&r.category)r.category=normalizeCategoryName(r.category);
    });
  }
}
function ensureDefaults(s){
  s.year=s.year??2026; s.month=s.month??6;
  s.categories=s.categories||[];
  normalizeCategoryData(s);
  defaultCategories.forEach((n,i)=>{if(!s.categories.find(c=>c.name===n))s.categories.push({id:id(),name:n,color:catColors[i%catColors.length]})});
  s.income=s.income||[]; s.fixed=s.fixed||[]; s.offsets=s.offsets||[];
  migrateRecurringItems(s);
  ensureMonthlyRecurringDefaults(s,s.year,s.month);
  s.transactions=s.transactions||[]; s.cardTotals=s.cardTotals||{}; s.merchantRules=s.merchantRules||{}; s.memberRules=s.memberRules||{}; s.exceptionRules=s.exceptionRules||{};
  s.transactions.forEach(t=>{if(t.exceptional==null)t.exceptional=false; if(t.exceptionType==null)t.exceptionType=''; if(!t.members&&t.member)t.members=parseMembers(t.member); t.installment=normalizeInstallment(t.installment||'')});
  sanitizeSuspiciousInstallments(s,false);
  return s
}
function migrateRecurringItems(s){
  ['income','fixed','offsets'].forEach(type=>{
    s[type]=(s[type]||[]).map(item=>{
      if(item.year==null||item.month==null){
        return {...item,year:LEGACY_RECURRING_YEAR,month:LEGACY_RECURRING_MONTH};
      }
      return item;
    });
  });
}
function ensureMonthlyRecurringDefaults(s,y=state?.year??2026,m=state?.month??6){
  s.income=s.income||[]; s.fixed=s.fixed||[]; s.offsets=s.offsets||[];
  defaultIncome.forEach(n=>{if(!s.income.find(x=>x.name===n&&Number(x.year)===Number(y)&&Number(x.month)===Number(m)))s.income.push({id:id(),name:n,amount:0,year:y,month:m})});
  defaultFixed.forEach(n=>{if(!s.fixed.find(x=>x.name===n&&Number(x.year)===Number(y)&&Number(x.month)===Number(m)))s.fixed.push({id:id(),name:n,amount:0,category:n.includes('משכנתא')?'משכנתא':'חסכונות',year:y,month:m})});
  defaultOffsets.forEach(n=>{if(!s.offsets.find(x=>x.name===n&&Number(x.year)===Number(y)&&Number(x.month)===Number(m)))s.offsets.push({id:id(),name:n,amount:0,category:'קיזוז',year:y,month:m})});
}
function currentItems(type){ensureMonthlyRecurringDefaults(state,state.year,state.month); return (state[type]||[]).filter(x=>Number(x.year)===Number(state.year)&&Number(x.month)===Number(state.month))}
function normalizeInstallment(v){const m=String(v||'').replace(/\s+/g,' ').trim().match(/^(\d{1,2})\s*מתוך\s*(\d{1,2})$/); if(!m)return ''; const cur=Number(m[1]), total=Number(m[2]); if(!cur||!total||cur>total||total<2)return ''; return `${cur} מתוך ${total}`}
function sanitizeSuspiciousInstallments(s,manual=false){let changed=0; const txs=s.transactions||[]; const totals={}; const groups={}; txs.forEach(t=>{const y=t.year??s.year??state?.year??2026, m=t.month??s.month??state?.month??6, c=t.card||'ללא'; const base=[y,m,c].join('|'); totals[base]=(totals[base]||0)+1; const inst=normalizeInstallment(t.installment||''); t.installment=inst; if(inst){const k=base+'|'+inst; (groups[k]||(groups[k]=[])).push(t)}}); Object.entries(groups).forEach(([k,list])=>{const base=k.split('|').slice(0,3).join('|'); const suspicious=list.length>=6 && (manual || list.length/(totals[base]||1)>0.25); if(!suspicious)return; list.forEach(t=>{const evidence=String(t.raw||'').includes(t.installment); if(!evidence){t.installment=''; changed++}})}); return changed}
function persist(){state=ensureDefaults(state); localStorage.setItem(LS,JSON.stringify(state)); render()}
function id(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
function money(n){return Number(n||0).toLocaleString('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:0})}
function byMonth(arr){return arr.filter(x=>(x.year??state.year)==state.year&&(x.month??state.month)==state.month)}
function monthKey(y=state.year,m=state.month){return `${y}-${m}`}
function cardTotalsForMonth(){state.cardTotals=state.cardTotals||{}; return state.cardTotals[monthKey()]||{}}
function setCardTotal(card,value){state.cardTotals=state.cardTotals||{}; const k=monthKey(); state.cardTotals[k]=state.cardTotals[k]||{}; const v=num(value); if(card){state.cardTotals[k][card]=Math.round(v*100)/100} persist()}

function totals(){const inc=currentItems('income').reduce((a,b)=>a+num(b.amount),0); const fixed=currentItems('fixed').reduce((a,b)=>a+num(b.amount),0); const off=currentItems('offsets').reduce((a,b)=>a+num(b.amount),0); const tx=byMonth(state.transactions); const chargeable=tx.filter(t=>t.category!=='קיזוז'); const exceptionalTx=chargeable.filter(t=>!!t.exceptional); const regularTx=chargeable.filter(t=>!t.exceptional); const statementTotals=cardTotalsForMonth(); const hasStatement=Object.keys(statementTotals).length>0; const statementSum=Object.values(statementTotals).reduce((a,b)=>a+num(b),0); const itemizedSum=chargeable.reduce((a,b)=>a+num(b.amount),0); const card=hasStatement?statementSum:itemizedSum; const cardExceptional=exceptionalTx.reduce((a,b)=>a+num(b.amount),0); const cardRegular=card-cardExceptional; const ignored=tx.filter(t=>t.category==='קיזוז').reduce((a,b)=>a+num(b.amount),0); const expensesRegular=fixed+cardRegular; const expenses=fixed+card; return {inc,fixed,off,card,cardRegular,cardExceptional,ignored,expensesRegular,expenses,balanceRegular:inc-expensesRegular,balance:inc-expenses,netAfterOffsetsRegular:inc-expensesRegular+off,netAfterOffsets:inc-expenses+off,tx,regularTx,exceptionalTx,review:tx.filter(t=>t.review).length,statementTotals,hasStatement,itemizedSum}}

function summarizeByCategory(items){

function deltaText(cur,prev){

function memberInsights(arr){

async function importFiles(e){
  const files=[...e.target.files];
  let total=0;
  for(const f of files){
    try{
      let added=0;
      if(f.name.toLowerCase().endsWith('.pdf')){
        const result=await parsePdfOnServer(f);
        added=addImportedTransactions(result.transactions||[], f.name, result.diagnostics||{});
        importLog(`${f.name}: יובאו ${added} עסקאות (שרת PDF). ${result.diagnostics?JSON.stringify(result.diagnostics):''}`);
      } else {
        const text=await f.text();
        added=parseText(text,f.name);
        importLog(`${f.name}: יובאו ${added} עסקאות (CSV/TXT)`);
      }
      total+=added;
    }catch(err){
      importLog(`${f.name}: שגיאה ${err.message||err}`);
      alert(`${f.name}: ${err.message||err}`);
    }
  }
  e.target.value='';
  persist();
  alert(`סה״כ יובאו ${total} עסקאות`);
  go('transactions');
}
async function fileToBase64(file){
  const buf=await file.arrayBuffer();
  let binary='';
  const bytes=new Uint8Array(buf);
  const chunk=0x8000;
  for(let i=0;i<bytes.length;i+=chunk){binary+=String.fromCharCode(...bytes.subarray(i,i+chunk));}
  return btoa(binary);
}
async function parsePdfOnServer(file){
  const base64=await fileToBase64(file);
  const res=await fetch('/api/parse-card',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({filename:file.name,base64})});
  const text=await res.text();
  let json; try{json=JSON.parse(text)}catch{json={ok:false,error:text||('HTTP '+res.status)}}
  if(!res.ok||!json.ok) throw new Error(json.error||json.message||('HTTP '+res.status));
  return json;
}

 const out=[]; const arr=linesMerged(text);
 for(const l0 of arr){let l=l0.replace(/\s+/g,' ').trim(); if(isBadLine(l))continue; const dm=l.match(/\b\d{1,2}[\.\/]\d{1,2}[\.\/](?:\d{2}|\d{4})\b/); if(!dm)continue; const ams=amountMatches(l); if(!ams.length)continue; let amount=ams[ams.length-1]; if(Math.abs(num(amount))>200000)continue; const inst=getInstallment(l); const src=sourceCategoryFromLine(l);
 let merch=l.replace(dm[0],' ').replace(/₪\s*-?[\d,]+(?:\.\d{2})?/g,' ').replace(/-?[\d,]+\.\d{2}/g,' ').replace(/רגילה|ביטול עסקה|פריקה מיואב|תשלום\s*\d+\s*מתוך\s*\d+|מתוך\s*\d+/g,' ');
 if(src) merch=merch.replace(src,' '); merch=merch.replace(/קרנות בני זוג|הנחת מועדון|כל המשתמשים|עסקאות במועד החיוב|חיוב גבוה.*$/g,' ');
 out.push(makeTx(dm[0],merch,amount,card,src,file,inst)); }
 return out; }
function parseCal(text,file,card){
 const out=[]; for(const l0 of linesMerged(text)){let l=l0.replace(/\s+/g,' ').trim(); if(isBadLine(l))continue; const dm=l.match(/\b\d{1,2}[\/.]\d{1,2}[\/.](?:\d{2}|\d{4})\b/); if(!dm)continue; const ams=amountMatches(l); if(!ams.length)continue; const amount=ams[ams.length-1]; const inst=getInstallment(l); const src=sourceCategoryFromLine(l);
 let merch=l.replace(dm[0],' ').replace(/₪\s*-?[\d,]+(?:\.\d{2})?/g,' ').replace(/-?[\d,]+\.\d{2}/g,' ').replace(/סכום העסקה\s*-\s*[$€]\s*\d+(?:\.\d+)?/g,' ').replace(/תשלום\s*\d+\s*מתוך\s*\d+|מתוך\s*\d+/g,' ').replace(/[<>‹›]/g,' ');
 if(src) merch=merch.replace(src,' '); out.push(makeTx(dm[0],merch,amount,card,src,file,inst)); }
 return out; }
function parseIsracard(text,file,card){
 const out=[]; let foreign=false; for(const l0 of linesMerged(text)){let l=l0.replace(/\s+/g,' ').trim(); if(/רכישות בחו"ל/.test(l))foreign=true; if(/עסקות שחויבו|זוכו - בארץ/.test(l))foreign=false; if(isBadLine(l)||/שער המרה|פ\.עמלה|עמלה ברוטו|הנחה|מע"מ/.test(l))continue; const dm=l.match(/\b\d{1,2}[\/.]\d{1,2}[\/.](?:\d{2}|\d{4})\b/); if(!dm)continue; const nums=[...l.matchAll(/-?[\d,]+\.\d{2}/g)].map(m=>m[0].replace(/,/g,'')); if(!nums.length)continue; const amount=foreign?nums[0]:nums[nums.length-1]; const inst=getInstallment(l); const src=sourceCategoryFromLine(l);
 let merch=l.replace(dm[0],' ').replace(/-?[\d,]+\.\d{2}/g,' ').replace(/₪/g,' ').replace(/תש\.נייד|לא הוצג|ה\.קבע|\bא\b/g,' ').replace(/תשלום\s*\d+\s*מתוך\s*\d+/g,' ').replace(/WARSZAWA|KRAKOW|PARIS\s*\d*|AMSTERDAM|BRZEZINKA|BALICE|LYON|SINGAPORE|KANDERSTEG|NEW YORK|SEATTLE|LUXEMBOURG/g,' ');
 if(src)merch=merch.replace(src,' '); out.push(makeTx(dm[0],merch,amount,card,src,file,inst)); }
 return out; }
function parseGeneric(text,file,card){const out=[]; for(const l of linesMerged(text)){if(isBadLine(l))continue; const d=(l.match(/\d{1,2}[\.\/]\d{1,2}[\.\/](?:\d{2}|\d{4})/)||[])[0]; const ms=amountMatches(l); if(!d||!ms.length)continue; let merch=l.replace(d,'').replace(/₪?\s*-?[\d,]+(?:\.\d{2})?/g,'').trim(); if(merch.length>2)out.push(makeTx(d,merch,ms.pop(),card,'',file))} return out}
function categoryFromLine(l){for(const c of state.categories){if(l.includes(c.name))return c.name}return ''}
function toISO(d){const p=String(d).split(/[\/.-]/).map(Number); if(!p[0]||!p[1]||!p[2])return ''; if(p[2]<100)p[2]+=2000; return `${p[2]}-${String(p[1]).padStart(2,'0')}-${String(p[0]).padStart(2,'0')}`}
function downloadBackup(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ledger-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click()}
async function restoreBackup(e){const f=e.target.files[0]; if(!f)return; state=ensureDefaults(JSON.parse(await f.text())); persist(); e.target.value=''}

function dataStats(s){
  const st=ensureDefaults(JSON.parse(JSON.stringify(s||blank())));
  const nonZero = arr => (arr||[]).filter(x=>Math.abs(num(x.amount))>0.009).length;
  return {
    transactions:(st.transactions||[]).length,
    incomeNonZero:nonZero(st.income),
    fixedNonZero:nonZero(st.fixed),
    offsetsNonZero:nonZero(st.offsets),
    rules:Object.keys(st.merchantRules||{}).length+Object.keys(st.memberRules||{}).length+Object.keys(st.exceptionRules||{}).length,
    categories:(st.categories||[]).length
  };
}
function dataWeight(stats){return (stats.transactions||0)*10+(stats.incomeNonZero||0)*5+(stats.fixedNonZero||0)*5+(stats.offsetsNonZero||0)*5+(stats.rules||0)*2;}
function statsText(stats){return `עסקאות ${stats.transactions||0}, הכנסות ${stats.incomeNonZero||0}, קבועות ${stats.fixedNonZero||0}, קיזוזים ${stats.offsetsNonZero||0}, חוקים ${stats.rules||0}`}
function getLocalState(){try{return ensureDefaults(JSON.parse(localStorage.getItem(LS))||blank())}catch{return ensureDefaults(blank())}}
function saveCloudConfig(){
  config.email=document.getElementById('cEmail').value.trim().toLowerCase();
  config.password=document.getElementById('cPass').value;
  saveConfig(); log('Settings saved'); render();
}
function initSupabase(){ /* v9: no browser Supabase client. Server function handles cloud. */ }
function log(s){const el=document.getElementById('log'); if(el)el.textContent += new Date().toLocaleTimeString()+' '+s+'\n'}
function requireCloudFields(){
  if(!config.email) throw new Error('חסר אימייל');
  if(!config.password || config.password.length<6) throw new Error('סיסמת Ledger חייבת להיות לפחות 6 תווים');
}
async function callServer(action, payload={}){
  requireCloudFields();
  const res=await fetch('/api/ledger',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,email:config.email,password:config.password,...payload})});
  const text=await res.text();
  let json; try{json=JSON.parse(text)}catch{json={ok:false,error:text||('HTTP '+res.status)}}
  if(!res.ok || !json.ok){throw new Error(json.error || json.message || ('HTTP '+res.status))}
  return json;
}
async function testCloud(){
  try{saveCloudConfig(); const r=await callServer('test'); cloudSession=true; log('SERVER TEST OK '+JSON.stringify(r)); alert('בדיקת שרת תקינה. אפשר לטעון/לשמור לענן.');}
  catch(e){cloudSession=false; log('TEST ERROR '+(e.message||e)); alert('שגיאת בדיקה: '+(e.message||e));}
  render();
}
async function signUp(){return testCloud()}
async function fetchCloudState(){
  const r=await callServer('load');
  const remote=(r.data&&Object.keys(r.data).length)?ensureDefaults(r.data):null;
  return {remote,updated_at:r.updated_at||null};
}
async function signIn(){
  try{
    saveCloudConfig();
    const {remote,updated_at}=await fetchCloudState();
    cloudSession=true;
    if(remote){
      state=ensureDefaults(remote);
      localStorage.setItem(LS,JSON.stringify(state));
      log('LOAD CLOUD OK '+statsText(dataStats(state))+(updated_at?' updated '+updated_at:''));
      render();
      alert('נטען מהענן בהצלחה. '+statsText(dataStats(state)));
    }else{
      log('CLOUD EMPTY - local kept '+statsText(dataStats(state)));
      render();
      alert('הענן ריק. השארתי את הנתונים המקומיים. אם זו התקנה ראשונה, לחץ שמור לענן רק אחרי שבדקת שהמסכים נכונים.');
    }
  }catch(e){cloudSession=false; log('LOGIN/LOAD ERROR '+(e.message||e)); alert('שגיאת טעינה מהענן: '+(e.message||e)); render();}
}
async function signOut(){cloudSession=false; render()}
async function loadCloud(){return signIn()}
async function saveCloudNow(){
  try{
    saveCloudConfig();
    const local=ensureDefaults(state);
    const localStats=dataStats(local);
    const localWeight=dataWeight(localStats);
    let remote=null, remoteStats=null, remoteWeight=0;
    try{const r=await fetchCloudState(); remote=r.remote; if(remote){remoteStats=dataStats(remote); remoteWeight=dataWeight(remoteStats)}}catch(e){log('Pre-save cloud check failed: '+(e.message||e));}
    if(remote && remoteWeight>0 && localWeight===0){
      alert('עצירה: הענן מכיל נתונים ('+statsText(remoteStats)+') אבל האתר המקומי ריק. כדי למנוע מחיקה, קודם לחץ "טען מהענן".');
      return;
    }
    if(remote && remoteWeight>localWeight+20){
      const ok=confirm('זהירות: בענן יש יותר נתונים מאשר במסך הנוכחי.\nענן: '+statsText(remoteStats)+'\nמקומי: '+statsText(localStats)+'\nלהמשיך ולדרוס את הענן?');
      if(!ok)return;
    }
    if(remote){
      try{await callServer('snapshot',{data:remote,reason:'auto-before-save-v22'}); log('Auto snapshot before save created');}catch(e){log('Auto snapshot failed: '+(e.message||e));}
    }
    const payload={...local,appVersion:APP_VERSION,lastCloudIso:new Date().toISOString(),lastCloudAt:new Date().toLocaleString('he-IL')};
    await callServer('save',{data:payload});
    cloudSession=true;
    state=ensureDefaults(payload);
    localStorage.setItem(LS,JSON.stringify(state));
    log('Saved cloud '+statsText(dataStats(state)));
    render();
    alert('נשמר בענן. '+statsText(dataStats(state)));
  }catch(e){log('SAVE ERROR '+(e.message||e)); alert('שגיאת שמירה: '+(e.message||e));}
}
async function cloudSnapshot(){
  try{saveCloudConfig(); await callServer('snapshot',{data:ensureDefaults(state),reason:'manual'}); cloudSession=true; log('Snapshot created'); alert('Snapshot נוצר בענן');}
  catch(e){log('SNAP ERROR '+(e.message||e)); alert('שגיאת Snapshot: '+(e.message||e));}
}
function scheduleCloudSave(){localStorage.setItem(LS,JSON.stringify(state)); if(!cloudSession)return; clearTimeout(saveTimer); saveTimer=setTimeout(()=>saveCloudNow().catch(()=>{}),1500)}
window.addEventListener('load',async()=>{
  initSupabase();
  render();
  if(config.email && config.password){
    setTimeout(async()=>{
      try{
        const {remote}=await fetchCloudState();
        if(remote && dataWeight(dataStats(remote))>0){
          state=ensureDefaults(remote);
          localStorage.setItem(LS,JSON.stringify(state));
          cloudSession=true;
          log('Auto-loaded cloud '+statsText(dataStats(state)));
          render();
        }
      }catch(e){log('Auto cloud load skipped: '+(e.message||e));}
    },500);
  }
});
render();

</script>
